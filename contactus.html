        <main>
            <article>
                <section id="">
                    <h1>Our Contact form</h1>
                    <fieldset>
                        <legend>
                            Send us a message:
                        </legend>
                        <form action="https://httpbin.org/get" method="get">
                            <p><label for="name"> Name : </label><input type="text" name="name" id="name" required autofocus></p>
                            <p><label for="email"> Email : </label><input type="email" name="email" id="email" required autofocus></p>
                            <p>Your message:</p>
                            <p><textarea name="message" id="msg" rows="15" cols="25" placeholder="Type here"></textarea></p>
                            <button type="submit">Send</button>
                            <button type="reset"> reset </button>
        
                        </form>
                    </fieldset><br>
                </section>
                <section id="location">
                    <h2>Our Location:</h2>
                    <p>
                        555,tacos_and_drink street, <br>
                        United states
                    </p>
                </section>
            </article>
        </main>
